# Condition B_ema — EMA target adapter only (no regularization)
# Tests: Does EMA alone prevent collapse?
# Expected: erank stays high (EMA breaks collapse symmetry)
condition: "B-ema"

# EMA target adapter — the sole collapse prevention mechanism.
use_ema:    true
ema_decay:  0.999       # ~1000 step lag (0.996 was too fast — collapsed in 500 steps)
stop_grad:  true        # Redundant with EMA, but explicit

# Random init — near-identity (gain=0.1) starts near-collapsed,
# giving the collapse attractor a head start over EMA asymmetry.
adapter_init_gain: 1.0

# No regularization — isolates EMA's effect.
lambda_1:   0.0         # No SIGReg
lambda_2:   0.0         # No L_info

# Standard training.
batch_size: 128
n_steps:    50000
