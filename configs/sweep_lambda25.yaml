# Lambda sweep — lambda_1 = 25.0
# Based on Condition D3 (global SIGReg, no stop-grad)
# Short diagnostic run: 2000 steps to check if erank stays > 5

condition:    "D3-lam25"
stop_grad:    false
lambda_1:     25.0
lambda_2:     0.0
lambda_3:     0.0
sigreg_axis:  "global"
weight_decay: 0.01
lr_warmup:    true

# Finer logging for diagnostic sweep
log_every:    50
eval_every:   200
