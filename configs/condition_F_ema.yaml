# Condition F_ema — EMA + L_info_dense only (ablation: no SIGReg)
# Tests: Does L_info alone (with EMA) preserve information?
# Isolates SIGReg's contribution by removing it.
condition: "F-ema"

use_ema:        true
ema_decay:      0.999       # ~1000 step lag (0.996 collapsed B_ema in 500 steps)
stop_grad:      true
adapter_init_gain: 1.0     # Random init (gain=0.1 collapsed before EMA could act)

lambda_1:       0.0     # No SIGReg
lambda_2:       0.1     # L_info_dense only
use_dense_info: true

batch_size: 128
n_steps:    50000
