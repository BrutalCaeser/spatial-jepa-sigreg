# Condition D2_ema — EMA + per-channel SIGReg
# Tests: Intermediate spatial pressure — each feature dimension independently Gaussian
condition: "D2-ema"

use_ema:      true
ema_decay:    0.999       # ~1000 step lag (0.996 collapsed B_ema in 500 steps)
stop_grad:    true
adapter_init_gain: 1.0    # Random init (gain=0.1 collapsed before EMA could act)

lambda_1:     0.1       # SIGReg (per-channel)
lambda_2:     0.0
sigreg_axis:  "channel"

batch_size: 128
n_steps:    50000
