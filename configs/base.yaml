# GAP 1 Experiment — Base Configuration
# All conditions inherit these defaults. Condition-specific files override selectively.
# Reference: build_spec.md Section 8

# ────────────────────────────────────────────────────────────────────────────
# Data
# ────────────────────────────────────────────────────────────────────────────
feature_dir: "/scratch/${USER}/data/ssv2_vjepa21_features"
output_dir:  "/scratch/${USER}/outputs/gap1"

# ────────────────────────────────────────────────────────────────────────────
# Adapter (models/adapter.py — Definition 1.2, foundations.md)
# ────────────────────────────────────────────────────────────────────────────
D_in: 1024       # V-JEPA 2.1 ViT-L embedding dimension (vjepa2_1_vit_large_384, img_size=224 → 196 patches)
d:    256        # Adapter output dimension (ablate: 128, 256, 512)

# ────────────────────────────────────────────────────────────────────────────
# Predictor (models/predictor.py — Definition 1.3, foundations.md)
# ────────────────────────────────────────────────────────────────────────────
n_layers:  6
n_heads:   8
d_action:  64     # Action embedding dimension
n_classes: 174    # SSv2 action class count
dropout:   0.1

# ────────────────────────────────────────────────────────────────────────────
# Training
# ────────────────────────────────────────────────────────────────────────────
batch_size:    32
n_steps:       50000
learning_rate: 3.0e-4
weight_decay:  0.01
warmup_steps:  2000
lr_warmup:     true       # Set false for Condition A (CLAUDE.md)
grad_clip:     1.0
seed:          42
num_workers:   4

# ────────────────────────────────────────────────────────────────────────────
# Loss configuration defaults (all overridden per condition)
# ────────────────────────────────────────────────────────────────────────────
stop_grad:      false
lambda_1:       0.1        # SIGReg weight
lambda_2:       0.1        # L_info weight
lambda_3:       0.0        # L_cov weight (optional stabilizer)
sigreg_axis:    "global"   # Options: global, token, channel
use_dense_info: true       # true = L_info_dense; false = L_info_pooled
use_cov_reg:    false

# EMA target adapter (collapse prevention — see CHANGELOG Session 10)
use_ema:        false          # When true, target z_t comes from EMA adapter
ema_decay:      0.996          # θ̄ ← decay·θ̄ + (1-decay)·θ  (V-JEPA default range: 0.996–0.999)

# SIGReg hyperparameters (Definition 3.2, foundations.md)
M_projections: 1024
T_knots:       17
bandwidth:     1.0

# ────────────────────────────────────────────────────────────────────────────
# Logging
# ────────────────────────────────────────────────────────────────────────────
log_every:   100
eval_every:  500
probe_every: 5000
save_every:  10000

# W&B configuration
wandb_project: "gap1-sigreg-spatial"
wandb_entity:  "brutalcaesar-northeastern-university"
