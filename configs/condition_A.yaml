# Condition A — Collapse Baseline
#
# Definition 3.7 (foundations.md): L = L_pred(z_hat, z_t)
# No stop-gradient, no SIGReg, no L_info.
# Gradient flows through BOTH z_c and z_t paths (shared adapter weights).
# This is the trivial fixed point where A_theta(f) -> constant.
#
# Critical constraints (CLAUDE.md):
#   - weight_decay = 0.0  (remove ALL implicit regularization)
#   - lr_warmup = false   (warmup slows collapse dynamics)
#   - grad_clip = 1.0     (raise to 10.0 if FM1: collapse not observed by step 5000)
